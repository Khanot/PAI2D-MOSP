<!DOCTYPE html>
<html>
<head>
    <title>Itinéraire Cycliste Paris</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); width: 250px;
        }
        #status { margin-top: 10px; font-size: 13px; color: #555; }
        button {
            margin-top: 10px; width: 100%; padding: 8px;
            background: #2196F3; color: white; border: none;
            border-radius: 4px; cursor: pointer;
        }
        button:hover { background: #1976D2; }
        #reset { background: #757575; }
        #reset:hover { background: #616161; }
        .legend { margin-top: 10px; font-size: 12px; }
        .legend span {
            display: inline-block; width: 12px; height: 12px;
            border-radius: 50%; margin-right: 5px; vertical-align: middle;
        }
        .suggestions {
        border: 1px solid #ccc; border-radius: 4px;
        max-height: 150px; overflow-y: auto;
        background: white; display: none;
        }
        .suggestion-item {
            padding: 6px 8px; cursor: pointer; font-size: 12px;
        }
        .suggestion-item:hover { background: #e3f2fd; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="panel">
        <div style="margin-bottom:10px">
            <input id="search-src" type="text" placeholder="🔍 Rechercher source..." 
                style="width:100%; padding:6px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px"/>
            <div id="suggestions-src" class="suggestions"></div>
        </div>
        <div style="margin-bottom:10px">
            <input id="search-dst" type="text" placeholder="🔍 Rechercher destination..."
                style="width:100%; padding:6px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px"/>
            <div id="suggestions-dst" class="suggestions"></div>
        </div>
        <div id="distance-info" style="font-weight:bold; color:#1976D2; margin-top:8px"></div>
        <h3 style="margin:0 0 10px">Itinéraire cycliste</h3>
        <div><b>Source :</b> <span id="src-label">non sélectionnée</span></div>
        <div><b>Dest :</b> <span id="dst-label">non sélectionnée</span></div>
        <label>Seuil (%) : <input id="seuil" type="number" value="20" min="0" max="100" style="width:60px"/></label>
        <button id="btn-calcul" onclick="calculer()">Calculer</button>
        <button id="reset" onclick="resetSelection()">Réinitialiser</button>
        <div id="status">Cliquez sur un sommet pour le sélectionner.</div>
        <div class="legend">
            <div><span style="background:green"></span>Source</div>
            <div><span style="background:red"></span>Destination</div>
            <div><span style="background:blue"></span>Chemin optimal</div>
            <div><span style="background:orange"></span>Autres chemins Pareto</div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/main.js"></script>
</body>
</html>
